runtime:
  # owner resolved from GEODEPLOY_DEPLOY_USER / DEPLOY_USER /
  # /etc/geodineum/deploy.env.
  # geodineum-code: shared framework/theme source readers (www-data, geodine).
  group: geodineum-code

triggers:
  - match: "**/*.php"
    actions: [opcache-clear]

dirty-tree:
  strategy: stash

cli:
  commands:
    - name: template contract
      handler: scripts/cli/template-contract.sh
      description: Print the gTemplate theme integration contract
      category: Theme
    - name: cache clear
      handler: scripts/cli/cache-clear.sh
      description: Purge gTemplate page-cache entries for a site
      category: Cache
      requires_sudo: true
    - name: cache stats
      handler: scripts/cli/cache-stats.sh
      description: Show page-cache key counts (all sites, or one)
      category: Cache
      requires_sudo: true
